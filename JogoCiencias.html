<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bio-Explorer: Missão João Rafael</title>
    <style>
        :root {
            --produtor: #4CAF50;
            --consumidor: #2196F3;
            --decompositor: #FF9800;
            --perigo: #f44336;
            --fundo: #f0f4f8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--fundo);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #e67e22;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        #status-bar {
            display: flex;
            justify-content: space-around;
            background: #333;
            color: white;
            padding: 10px;
            font-size: 0.9rem;
        }

        #screen {
            flex-grow: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .btn {
            background: var(--consumidor);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 1rem;
            margin: 10px;
            width: 80%;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 4px #1565C0;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 transparent;
        }

        .btn-produtor { background: var(--produtor); box-shadow: 0 4px #2E7D32; }
        .btn-decompositor { background: var(--decompositor); box-shadow: 0 4px #EF6C00; }

        #feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px;
            border-radius: 15px;
            display: none;
            z-index: 100;
            text-align: center;
            width: 80%;
            font-weight: bold;
            color: white;
        }

        .card {
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            margin: 10px;
            width: 90%;
            text-align: center;
        }

        .image-placeholder {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .progress-container {
            width: 80%;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            margin-top: 10px;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--produtor);
            border-radius: 5px;
            transition: width 0.3s;
        }

    </style>
</head>
<body>

<div id="game-container">
    <header id="header-title">EXPEDIÇÃO CIÊNCIAS</header>
    
    <div id="status-bar">
        <span>Missão: <span id="current-mission">1/4</span></span>
        <span>Pontos: <span id="score">0</span></span>
    </div>

    <div id="screen">
        </div>

    <div id="feedback"></div>
</div>

<script>
    const screen = document.getElementById('screen');
    const feedback = document.getElementById('feedback');
    const scoreEl = document.getElementById('score');
    const missionEl = document.getElementById('current-mission');
    
    let score = 0;
    let mission = 0;

    const gameData = [
        {
            title: "O MISTÉRIO DOS FUNGOS",
            text: "João Rafael encontrou um morango mofado. O que são os fungos na cadeia alimentar?",
            options: [
                { text: "Produtores (fazem fotossíntese)", correct: false },
                { text: "Decompositores (absorvem nutrientes)", correct: true },
                { text: "Consumidores primários", correct: false }
            ],
            icon: "🍓🍄",
            hint: "Dica: Eles 'limpam' a natureza!"
        },
        {
            title: "QUEM COME QUEM?",
            text: "Um Gafanhoto come a grama e o Sapo come o Gafanhoto. O Sapo é um:",
            options: [
                { text: "Consumidor Primário", correct: false },
                { text: "Produtor", correct: false },
                { text: "Consumidor Secundário", correct: true }
            ],
            icon: "🐸🦗",
            hint: "Dica: Ele é o segundo a comer!"
        },
        {
            title: "RESPIRAÇÃO SUBMARINA",
            text: "Como os peixes conseguem oxigênio dentro da água?",
            options: [
                { text: "Pelos pulmões", correct: false },
                { text: "Pelas brânquias", correct: true },
                { text: "Pela pele (cutânea)", correct: false }
            ],
            icon: "🐟🌊",
            hint: "Dica: É um órgão especial para a água."
        },
        {
            title: "O SUPERPODER DAS PLANTAS",
            text: "As plantas crescem em direção à janela em busca de luz. Isso se chama:",
            options: [
                { text: "Irritabilidade", correct: true },
                { text: "Locomoção", correct: false },
                { text: "Sono", correct: false }
            ],
            icon: "🌱☀️",
            hint: "Dica: É a capacidade de perceber o ambiente!"
        },
        {
            title: "VERDADEIRO OU FALSO?",
            text: "As plantas carnívoras comem insetos porque NÃO fazem fotossíntese.",
            options: [
                { text: "Verdadeiro", correct: false },
                { text: "Falso (elas fazem fotossíntese)", correct: true }
            ],
            icon: "🪴🦟",
            hint: "Dica: Elas só querem um 'lanchinho' extra de nutrientes!"
        }
    ];

    function loadMission() {
        if (mission >= gameData.length) {
            showEndScreen();
            return;
        }

        const data = gameData[mission];
        missionEl.innerText = `${mission + 1}/${gameData.length}`;
        
        screen.innerHTML = `
            <div class="card">
                <div class="image-placeholder">${data.icon}</div>
                <h3>${data.title}</h3>
                <p>${data.text}</p>
            </div>
            <div id="options-container" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                ${data.options.map((opt, index) => `
                    <button class="btn" onclick="checkAnswer(${index})">${opt.text}</button>
                `).join('')}
            </div>
            <div class="progress-container"><div id="progress-bar" style="width: ${(mission/gameData.length)*100}%"></div></div>
        `;
    }

    window.checkAnswer = function(index) {
        const isCorrect = gameData[mission].options[index].correct;
        
        feedback.style.display = 'block';
        if (isCorrect) {
            feedback.style.backgroundColor = 'var(--produtor)';
            feedback.innerHTML = "✨ ACERTOU! ✨<br>Muito bem, João Rafael!";
            score += 10;
            scoreEl.innerText = score;
        } else {
            feedback.style.backgroundColor = 'var(--perigo)';
            feedback.innerHTML = "QUASE LÁ!<br>" + gameData[mission].hint;
        }

        setTimeout(() => {
            feedback.style.display = 'none';
            if (isCorrect) {
                mission++;
                loadMission();
            }
        }, 2000);
    };

    function showEndScreen() {
        screen.innerHTML = `
            <div class="card">
                <div class="image-placeholder">🏆</div>
                <h2>PARABÉNS, JOÃO RAFAEL!</h2>
                <p>Você completou a expedição de Ciências!</p>
                <h1 style="color: var(--produtor)">${score} PONTOS</h1>
                <button class="btn" onclick="resetGame()">Jogar Novamente</button>
            </div>
        `;
    }

    window.resetGame = function() {
        score = 0;
        mission = 0;
        scoreEl.innerText = score;
        loadMission();
    };

    // Iniciar
    loadMission();

</script>
</body>
</html>
