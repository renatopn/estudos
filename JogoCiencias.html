<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bio-Explorer: Missão 30 Questões</title>
    <style>
        :root {
            --produtor: #4CAF50;
            --consumidor: #2196F3;
            --decompositor: #FF9800;
            --perigo: #f44336;
            --fundo: #f0f4f8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--fundo);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #e67e22;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            transition: background 0.5s;
        }

        #status-bar {
            display: flex;
            justify-content: space-around;
            background: #333;
            color: white;
            padding: 12px;
            font-size: 1rem;
        }

        #screen {
            flex-grow: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .btn {
            background: var(--consumidor);
            color: white;
            border: none;
            padding: 18px 25px;
            border-radius: 12px;
            font-size: 1.1rem; /* Fonte maior conforme solicitado */
            margin: 8px;
            width: 95%;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 5px #1565C0;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 transparent;
        }

        #feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 30px;
            border-radius: 15px;
            display: none;
            z-index: 100;
            text-align: center;
            width: 85%;
            font-weight: bold;
            font-size: 1.3rem;
            color: white;
            box-shadow: 0 0 50px rgba(0,0,0,0.3);
        }

        .card {
            border: 2px solid #eee;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            width: 90%;
            text-align: center;
            background: #fafafa;
        }

        .sprite { font-size: 4rem; margin-bottom: 10px; }

        .progress-container {
            width: 100%;
            height: 12px;
            background: #ddd;
            border-radius: 6px;
            margin-top: 20px;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--produtor);
            border-radius: 6px;
            transition: width 0.3s;
        }

        h3 { margin: 10px 0; font-size: 1.2rem; }
        p { font-size: 1.1rem; line-height: 1.4; color: #444; }

    </style>
</head>
<body>

<div id="game-container">
    <header id="header-title">BIO-EXPLORER JR</header>
    
    <div id="status-bar">
        <span>Missão: <span id="current-mission">1/30</span></span>
        <span>Pontos: <span id="score">0</span></span>
    </div>

    <div id="screen">
        </div>

    <div id="feedback"></div>
</div>

<script>
    const screen = document.getElementById('screen');
    const feedback = document.getElementById('feedback');
    const scoreEl = document.getElementById('score');
    const missionEl = document.getElementById('current-mission');
    const header = document.getElementById('header-title');
    
    let score = 0;
    let currentMission = 0;

    const gameData = [
        // LIÇÃO 9: ALIMENTAÇÃO
        { q: "Os seres vivos precisam de alimento para duas coisas principais: energia e...", a: ["Diversão", "Nutrientes", "Sono"], c: 1, icon: "🍎", info: "Nutrientes servem para o corpo crescer e se renovar!" },
        { q: "Como são chamados os seres que produzem o próprio alimento?", a: ["Heterótrofos", "Hematófagos", "Autótrofos"], c: 2, icon: "🌱", info: "Auto = próprio. Eles produzem glicose!" },
        { q: "Qual o nome do processo que as plantas usam para fabricar alimento?", a: ["Respiração", "Fotossíntese", "Digestão"], c: 1, icon: "☀️", info: "Luz solar + Água + Ar = Alimento!" },
        { q: "Os animais que comem somente plantas são os:", a: ["Herbívoros", "Carnívoros", "Onívoros"], c: 0, icon: "🐄", info: "Ex: Vacas, coelhos e capivaras." },
        { q: "O ser humano, que come carne e plantas, é um ser:", a: ["Herbívoro", "Onívoro", "Hematófago"], c: 1, icon: "🍱", info: "Onívoro come de tudo!" },
        { q: "O mosquito e o piolho se alimentam de sangue. Eles são:", a: ["Necrófagos", "Detritívoros", "Hematófagos"], c: 2, icon: "🦟", info: "Hemato significa sangue!" },
        { q: "Urubus e hienas comem animais mortos. Eles são chamados de:", a: ["Necrófagos", "Produtores", "Herbívoros"], c: 0, icon: "🦅", info: "Também podem ser chamados de detritívoros." },
        { q: "Quem são os seres que absorvem nutrientes de restos e devolvem ao solo?", a: ["Consumidores", "Decompositores", "Predadores"], c: 1, icon: "🍄", info: "Fungos e micro-organismos!" },
        { q: "Os cogumelos são heterótrofos por...", a: ["Ingestão (comem)", "Absorção", "Fotossíntese"], c: 1, icon: "🍄", info: "Eles não têm boca, eles absorvem o alimento!" },
        { q: "Na cadeia alimentar, a GRAMA é sempre um:", a: ["Consumidor", "Produtor", "Decompositor"], c: 1, icon: "🌿", info: "A planta é a base da cadeia!" },
        { q: "Se um rato come a grama, ele é um consumidor de qual ordem?", a: ["Primário", "Secundário", "Terciário"], c: 0, icon: "🐭", info: "Ele é o primeiro a consumir!" },
        { q: "O conjunto de várias cadeias alimentares juntas chama-se:", a: ["Nível trófico", "Teia alimentar", "Fotossíntese"], c: 1, icon: "🕸️", info: "Na natureza, as cadeias se misturam." },
        
        // LIÇÃO 9: RESPIRAÇÃO
        { q: "Para o corpo usar a energia do alimento, ele precisa de:", a: ["Água", "Oxigênio", "Luz"], c: 1, icon: "🌬️", info: "É por isso que os seres vivos respiram!" },
        { q: "Os humanos respiram pelos pulmões. Que tipo de respiração é essa?", a: ["Branquial", "Traqueal", "Pulmonar"], c: 2, icon: "🫁", info: "Usamos o nariz e os pulmões." },
        { q: "Os peixes retiram o oxigênio da água usando as...", a: ["Brânquias", "Traqueias", "Nadadeiras"], c: 0, icon: "🐟", info: "Também chamadas de guelras." },
        { q: "Insetos, como o gafanhoto, respiram por buraquinhos chamados:", a: ["Pulmões", "Traqueias", "Estômatos"], c: 1, icon: "🦗", info: "Ficam nas laterais do corpo do inseto." },
        { q: "Sapos e minhocas respiram pela pele úmida. É a respiração:", a: ["Pulmonar", "Branquial", "Cutânea"], c: 2, icon: "🪱", info: "Cútis significa pele!" },
        { q: "As plantas também respiram! Elas usam buraquinhos nas folhas chamados:", a: ["Estômatos", "Cílios", "Raízes"], c: 0, icon: "🍃", info: "Elas trocam gases com o ar por ali." },
        
        // LIÇÃO 10: PERCEPÇÃO E MOVIMENTO
        { q: "A capacidade de perceber o ambiente e reagir chama-se:", a: ["Locomoção", "Irritabilidade", "Crescimento"], c: 1, icon: "⚡", info: "É vital para a sobrevivência!" },
        { q: "As plantas não têm olhos, mas percebem a...", a: ["Música", "Luz", "Conversa"], c: 1, icon: "🌻", info: "Elas crescem em direção à luz (fototropismo)." },
        { q: "As raízes das plantas crescem em direção à:", a: ["Luz solar", "Água", "Lua"], c: 1, icon: "🪴", info: "As raízes buscam água e nutrientes." },
        { q: "A planta 'dormideira' fecha as folhas ao ser tocada. Isso é:", a: ["Sono", "Irritabilidade", "Locomoção"], c: 1, icon: "🌿", info: "Ela reage ao toque!" },
        { q: "As 'molinhas' que algumas plantas usam para subir em suportes são:", a: ["Gavinhas", "Espinhos", "Flores"], c: 0, icon: "🎋", info: "Ex: chuchu e parreiras de uva." },
        { q: "Qual a diferença entre plantas e animais sobre movimento?", a: ["Plantas não se movem", "Animais se locomovem (saem do lugar)", "São iguais"], c: 1, icon: "🏃", info: "Plantas se movem, mas não mudam de lugar sozinhas." },
        { q: "A tartaruga marinha tem patas em formato de:", a: ["Nadadeira", "Cilíndrica", "Garra"], c: 0, icon: "🐢", info: "O formato depende do ambiente onde vivem." },
        { q: "Micro-organismos como a ameba usam 'falsos pés' chamados:", a: ["Cílios", "Flagelos", "Pseudópodes"], c: 2, icon: "🦠", info: "Pseudo = falso / Podes = pés." },
        { q: "A Euglena usa um 'rabinho' longo para nadar, chamado:", a: ["Cílio", "Flagelo", "Nadadeira"], c: 1, icon: "🧪", info: "É como um chicote para se mover." },
        { q: "O Paramecium usa pelinhos curtos para se mover, chamados:", a: ["Cílios", "Gavinhas", "Tentáculos"], c: 0, icon: "🧬", info: "São milhares de pequenos cílios." },
        { q: "Plantas carnívoras comem insetos porque o solo é...", a: ["Muito rico", "Pobre em nutrientes", "Muito seco"], c: 1, icon: "🪴", info: "Elas fazem fotossíntese, mas precisam de 'suplemento'!" },
        { q: "Quantos sentidos os animais usam para perceber o perigo?", a: ["Somente a visão", "Os cinco sentidos", "Apenas o tato"], c: 1, icon: "👂", info: "Visão, audição, olfato, tato e paladar!" }
    ];

    function loadMission() {
        if (currentMission >= gameData.length) {
            showVictory();
            return;
        }

        const data = gameData[currentMission];
        missionEl.innerText = `${currentMission + 1}/${gameData.length}`;
        updateHeaderColor();

        screen.innerHTML = `
            <div class="card">
                <div class="sprite">${data.icon}</div>
                <p>${data.q}</p>
            </div>
            ${data.a.map((opt, i) => `
                <button class="btn" onclick="checkAnswer(${i})">${opt}</button>
            `).join('')}
            <div class="progress-container">
                <div id="progress-bar" style="width: ${(currentMission/gameData.length)*100}%"></div>
            </div>
        `;
    }

    window.checkAnswer = function(index) {
        const data = gameData[currentMission];
        const isCorrect = (index === data.c);
        
        feedback.style.display = 'block';
        if (isCorrect) {
            feedback.style.backgroundColor = 'var(--produtor)';
            feedback.innerHTML = "🌟 CORRETO! 🌟<br><small>" + data.info + "</small>";
            score += 10;
        } else {
            feedback.style.backgroundColor = 'var(--perigo)';
            feedback.innerHTML = "❌ QUASE... ❌<br><small>Tente lembrar do livro!</small>";
        }

        setTimeout(() => {
            feedback.style.display = 'none';
            if (isCorrect) {
                currentMission++;
                scoreEl.innerText = score;
                loadMission();
            }
        }, 2500);
    };

    function updateHeaderColor() {
        if (currentMission < 12) header.style.background = "#2ecc71"; // Cadeia Alimentar
        else if (currentMission < 18) header.style.background = "#3498db"; // Respiração
        else header.style.background = "#9b59b6"; // Percepção
    }

    function showVictory() {
        header.style.background = "#f1c40f";
        header.innerText = "MISSÃO CUMPRIDA!";
        screen.innerHTML = `
            <div class="card">
                <div class="sprite">🏆</div>
                <h2>PARABÉNS, JOÃO RAFAEL!</h2>
                <p>Você revisou todo o conteúdo das Lições 9 e 10!</p>
                <h1 style="color: #e67e22">${score} PONTOS</h1>
                <button class="btn" onclick="location.reload()">JOGAR DE NOVO</button>
            </div>
        `;
    }

    loadMission();
</script>
</body>
</html>
