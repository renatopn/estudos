<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bio-Explorer JS</title>
    <style>
        :root {
            --bioma-jardim: #2ecc71;
            --bioma-selva: #27ae60;
            --bioma-oceano: #3498db;
            --bioma-caverna: #34495e;
            --texto: #2c3e50;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            margin: 0;
            background: #ecf0f1;
            color: var(--texto);
            display: flex;
            justify-content: center;
            touch-action: manipulation;
        }

        #game-box {
            width: 100%;
            max-width: 450px;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        #header {
            padding: 20px;
            text-align: center;
            background: var(--bioma-jardim);
            color: white;
            transition: background 0.5s;
        }

        #hud {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: #f8f9fa;
            border-bottom: 2px solid #ddd;
            font-size: 0.9rem;
        }

        #screen {
            flex-grow: 1;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .sprite {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .btn {
            width: 100%;
            padding: 18px;
            margin: 10px 0;
            border: none;
            border-radius: 15px;
            background: #eee;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px #ccc;
            transition: 0.1s;
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px #ccc;
        }

        .btn-option { background: white; border: 2px solid var(--bioma-jardim); }
        .btn-option:hover { background: #f0fff4; }

        #energy-bar-container {
            width: 100%;
            height: 20px;
            background: #ddd;
            border-radius: 10px;
            margin: 15px 0;
            overflow: hidden;
        }

        #energy-fill {
            height: 100%;
            width: 100%;
            background: #2ecc71;
            transition: width 0.5s;
        }

        #feedback-pop {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            padding: 30px;
            border-radius: 20px;
            color: white;
            text-align: center;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div id="game-box">
    <div id="header">
        <h2 id="bioma-name">BIOMA: JARDIM</h2>
    </div>
    
    <div id="hud">
        <span>Energia (Glicose):</span>
        <span id="score">Pontos: 0</span>
    </div>

    <div id="screen">
        <div class="sprite">🌱</div>
        <h3>Bem-vindo, Bio-Explorer João Rafael!</h3>
        <p>Sua missão é completar o ciclo da vida. Use seus conhecimentos de ciências para sobreviver!</p>
        <button class="btn" style="background: var(--bioma-jardim); color: white;" onclick="startGame()">INICIAR EXPEDIÇÃO</button>
    </div>

    <div id="feedback-pop"></div>
</div>

<script>
    const screen = document.getElementById('screen');
    const header = document.getElementById('header');
    const biomaName = document.getElementById('bioma-name');
    const scoreEl = document.getElementById('score');
    const feedback = document.getElementById('feedback-pop');

    let currentStep = 0;
    let score = 0;
    let energy = 100;

    const missions = [
        {
            bioma: "JARDIM DOS PRODUTORES",
            color: "#2ecc71",
            icon: "🌻",
            quest: "O girassol está virando em direção ao Sol para fazer fotossíntese. Como chamamos essa reação ao ambiente?",
            options: ["Locomoção", "Irritabilidade", "Respiração"],
            correct: 1,
            info: "Isso mesmo! Plantas não caminham, mas reagem a estímulos!"
        },
        {
            bioma: "JARDIM DOS PRODUTORES",
            color: "#2ecc71",
            icon: "🪴",
            quest: "As plantas produzem o próprio alimento através da luz. Elas são chamadas de:",
            options: ["Consumidores", "Produtores (Autótrofos)", "Decompositores"],
            correct: 1,
            info: "Perfeito! O alimento delas é a Glicose."
        },
        {
            bioma: "SELVA DOS CONSUMIDORES",
            color: "#27ae60",
            icon: "🦗",
            quest: "Um gafanhoto comeu a folha. Na cadeia alimentar, ele é um:",
            options: ["Consumidor Primário", "Consumidor Secundário", "Produtor"],
            correct: 0,
            info: "Boa! Ele é o primeiro consumidor da fila."
        },
        {
            bioma: "SELVA DOS CONSUMIDORES",
            color: "#27ae60",
            icon: "🐍",
            quest: "A serpente come o rato, que come o gafanhoto. O que acontece se os fungos sumirem?",
            options: ["Nada acontece", "As plantas crescem mais", "O solo fica sem nutrientes"],
            correct: 2,
            info: "Correto! Os decompositores devolvem nutrientes ao solo."
        },
        {
            bioma: "OCEANO DA RESPIRAÇÃO",
            color: "#3498db",
            icon: "🐟",
            quest: "O peixe retira oxigênio da água. Qual o nome desse tipo de respiração?",
            options: ["Cutânea", "Pulmonar", "Branquial"],
            correct: 2,
            info: "As brânquias são como filtros de oxigênio na água!"
        },
        {
            bioma: "OCEANO DA RESPIRAÇÃO",
            color: "#3498db",
            icon: "🐸",
            quest: "O sapo consegue respirar pela pele fina e úmida. Essa é a respiração:",
            options: ["Traqueal", "Cutânea", "Vegetal"],
            correct: 1,
            info: "Isso! Por isso a pele do sapo precisa estar sempre úmida."
        },
        {
            bioma: "CAVERNA DOS SENTIDOS",
            color: "#34495e",
            icon: "🦇",
            quest: "Dentro de uma caverna escura, qual sentido ajuda um animal a não bater nas paredes?",
            options: ["Visão", "Audição (Som)", "Paladar"],
            correct: 1,
            info: "Os morcegos usam o som para 'enxergar' no escuro!"
        }
    ];

    function startGame() {
        currentStep = 0;
        score = 0;
        energy = 100;
        renderMission();
    }

    function renderMission() {
        if (currentStep >= missions.length) {
            showVictory();
            return;
        }

        const m = missions[currentStep];
        header.style.background = m.color;
        biomaName.innerText = `BIOMA: ${m.bioma}`;
        
        screen.innerHTML = `
            <div id="energy-bar-container"><div id="energy-fill" style="width: ${energy}%"></div></div>
            <div class="sprite">${m.icon}</div>
            <p style="font-size: 1.1rem;">${m.quest}</p>
            ${m.options.map((opt, i) => `
                <button class="btn btn-option" onclick="handleChoice(${i})">${opt.text || opt}</button>
            `).join('')}
        `;
    }

    window.handleChoice = function(choice) {
        const m = missions[currentStep];
        if (choice === m.correct) {
            score += 20;
            showFeedback(true, m.info);
            currentStep++;
            setTimeout(renderMission, 2500);
        } else {
            energy -= 20;
            showFeedback(false, "Ops! Tente analisar o conteúdo de novo.");
            if (energy <= 0) {
                setTimeout(showGameOver, 2000);
            }
        }
        scoreEl.innerText = `Pontos: ${score}`;
    };

    function showFeedback(win, msg) {
        feedback.style.display = 'block';
        feedback.style.background = win ? '#27ae60' : '#e74c3c';
        feedback.innerHTML = `<h2>${win ? 'MUITO BEM!' : 'ATENÇÃO!'}</h2><p>${msg}</p>`;
        setTimeout(() => feedback.style.display = 'none', 2300);
    }

    function showVictory() {
        header.style.background = "#f1c40f";
        biomaName.innerText = "EXPEDIÇÃO CONCLUÍDA!";
        screen.innerHTML = `
            <div class="sprite">🏆</div>
            <h2>PARABÉNS, JOÃO RAFAEL!</h2>
            <p>Você é um Mestre da Natureza!</p>
            <h3>Total: ${score} Pontos</h3>
            <button class="btn" onclick="startGame()">RECOMEÇAR</button>
        `;
    }

    function showGameOver() {
        biomaName.innerText = "MISSÃO FALHOU";
        screen.innerHTML = `
            <div class="sprite">😵</div>
            <h2>A ENERGIA ACABOU!</h2>
            <p>Vamos revisar o livro e tentar de novo?</p>
            <button class="btn" onclick="startGame()">TENTAR NOVAMENTE</button>
        `;
    }
</script>
</body>
</html>
