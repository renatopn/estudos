<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão Silábica: Capitão América</title>
    <style>
        :root {
            --cap-blue: #003366;
            --cap-red: #cc0000;
            --cap-white: #ffffff;
            --cap-silver: #c0c0c0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a;
            color: var(--cap-white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        #game-container {
            background: linear-gradient(135deg, var(--cap-blue), #001a33);
            border: 5px solid var(--cap-silver);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 51, 102, 0.8);
            position: relative;
        }

        h1 {
            color: var(--cap-white);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px var(--cap-red);
            margin-bottom: 10px;
        }

        .shield {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #fff 10%, var(--cap-red) 11%, var(--cap-red) 30%, var(--cap-white) 31%, var(--cap-white) 50%, var(--cap-red) 51%, var(--cap-red) 70%, var(--cap-blue) 71%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #000;
            font-size: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: spin 10s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .word-display {
            font-size: 35px;
            font-weight: bold;
            margin: 20px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            border-bottom: 4px solid var(--cap-red);
            letter-spacing: 3px;
        }

        input[type="text"] {
            width: 80%;
            padding: 15px;
            font-size: 22px;
            border-radius: 8px;
            border: 3px solid var(--cap-silver);
            margin-bottom: 20px;
            text-align: center;
            text-transform: lowercase;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--cap-red);
        }

        button {
            background-color: var(--cap-red);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            box-shadow: 0 4px #800000;
        }

        button:active {
            box-shadow: 0 0 #800000;
            transform: translateY(4px);
        }

        #feedback {
            margin-top: 25px;
            font-size: 20px;
            min-height: 60px;
            font-weight: bold;
            padding: 10px;
        }

        .correct { color: #4CAF50; text-shadow: 1px 1px #000; }
        .wrong { color: #ff6666; text-shadow: 1px 1px #000; }

        .stats {
            margin-top: 20px;
            font-size: 16px;
            color: var(--cap-silver);
            font-weight: bold;
        }

        .instruction {
            font-size: 15px;
            margin-bottom: 15px;
            color: #ddd;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="shield">⭐</div>
    <h1>Missão Silábica</h1>
    <p>Capitão, mostre que você domina as sílabas!</p>
    <p class="instruction">Use o hífen (<b>-</b>) para separar. Exemplo: <b>he-rói</b></p>

    <div class="word-display" id="current-word">INICIANDO...</div>
    
    <input type="text" id="user-input" placeholder="Digite aqui..." autocomplete="off">
    <br>
    <button onclick="checkAnswer()">Lançar Escudo!</button>

    <div id="feedback"></div>

    <div class="stats">
        Progresso da Missão: <span id="progress">0</span> de 30
    </div>
</div>

<script>
    const originalWordList = [
        { word: "herói", answer: "he-rói" },
        { word: "caixa", answer: "cai-xa" },
        { word: "peixe", answer: "pei-xe" },
        { word: "noite", answer: "noi-te" },
        { word: "papai", answer: "pa-pai" },
        { word: "leite", answer: "lei-te" },
        { word: "aula", answer: "au-la" },
        { word: "muito", answer: "mui-to" },
        { word: "glória", answer: "gló-ria" },
        { word: "história", answer: "his-tó-ria" },
        { word: "saúde", answer: "sa-ú-de" },
        { word: "poeta", answer: "po-e-ta" },
        { word: "moeda", answer: "mo-e-da" },
        { word: "viagem", answer: "vi-a-gem" },
        { word: "coelho", answer: "co-e-lho" },
        { word: "lua", answer: "lu-a" },
        { word: "dia", answer: "di-a" },
        { word: "rainha", answer: "ra-i-nha" },
        { word: "baú", answer: "ba-ú" },
        { word: "piada", answer: "pi-a-da" },
        { word: "paraguai", answer: "pa-ra-guai" },
        { word: "uruguai", answer: "u-ru-guai" },
        { word: "quaisquer", answer: "quais-quer" },
        { word: "saguão", answer: "sa-guão" },
        { word: "iguais", answer: "i-guais" },
        { word: "enxaguei", answer: "en-xa-guei" },
        { word: "averiguei", answer: "a-ve-ri-guei" },
        { word: "quais", answer: "quais" },
        { word: "apaziguou", answer: "a-pa-zi-guou" },
        { word: "enxaguou", answer: "en-xa-guou" }
    ];

    // Função para embaralhar a lista (Algoritmo de Fisher-Yates)
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    // Embaralha a lista no início
    let wordList = shuffle([...originalWordList]);
    let currentIndex = 0;

    const positiveFeedback = [
        "Avante, Vingador! Acerto perfeito!",
        "O Capitão América está orgulhoso!",
        "Precisão de herói! Continue assim!",
        "Fantástico! Sua mente é um escudo forte!",
        "Isso aí! Você dominou essa palavra!",
        "Missão cumprida com sucesso nessa palavra!"
    ];

    const retryFeedback = [
        "Não desista, recruta! Tente novamente.",
        "Um herói nunca desiste. Tente de novo!",
        "Quase lá! Lembre-se: Hiatos se separam, Ditongos ficam juntos!",
        "Ajuste sua mira! Tente separar essa palavra outra vez.",
        "Persistência é a chave! Vamos tentar mais uma vez?",
        "O escudo falhou, mas você pode tentar novamente!"
    ];

    function loadWord() {
        if (currentIndex < wordList.length) {
            document.getElementById('current-word').innerText = wordList[currentIndex].word;
            document.getElementById('user-input').value = '';
            document.getElementById('feedback').innerText = '';
            document.getElementById('progress').innerText = currentIndex;
            document.getElementById('user-input').focus();
        } else {
            document.getElementById('game-container').innerHTML = `
                <div class="shield">⭐</div>
                <h1>Missão Cumprida!</h1>
                <p style="font-size: 20px;">Parabéns, Capitão! Todas as palavras foram vencidas!</p>
                <p>Você é agora um mestre em Hiatos, Ditongos e Tritongos.</p>
                <button onclick="location.reload()">Reiniciar Treinamento</button>
            `;
        }
    }

    function checkAnswer() {
        const userInput = document.getElementById('user-input').value.trim().toLowerCase();
        const correctAnswer = wordList[currentIndex].answer;
        const feedbackEl = document.getElementById('feedback');

        if (userInput === correctAnswer) {
            const randomPositive = positiveFeedback[Math.floor(Math.random() * positiveFeedback.length)];
            feedbackEl.innerHTML = `<span class="correct">✔️ ${randomPositive}</span>`;
            currentIndex++;
            setTimeout(loadWord, 1800);
        } else {
            const randomRetry = retryFeedback[Math.floor(Math.random() * retryFeedback.length)];
            feedbackEl.innerHTML = `<span class="wrong">❌ ${randomRetry}</span>`;
            document.getElementById('user-input').select();
        }
    }

    document.getElementById('user-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkAnswer();
        }
    });

    // Inicia o jogo
    window.onload = loadWord;
</script>

</body>
</html>
