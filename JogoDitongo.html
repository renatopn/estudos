
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treinamento Silábico: Capitão América</title>
    <style>
        :root {
            --cap-blue: #002147;
            --cap-red: #cc0000;
            --cap-white: #ffffff;
            --cap-silver: #c0c0c0;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            background-color: #050505;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #game-container {
            background: linear-gradient(145deg, var(--cap-blue), #000);
            border: 4px solid var(--cap-red);
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 0 50px rgba(204, 0, 0, 0.4);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 18px;
            color: var(--cap-silver);
        }

        #timer-wrap {
            width: 100%;
            height: 15px;
            background: #222;
            border-radius: 10px;
            margin: 15px 0;
            border: 2px solid var(--cap-silver);
            overflow: hidden;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #f00, #ff0);
            transition: width 0.1s linear;
        }

        .word-display {
            font-size: 42px;
            margin: 20px 0;
            text-transform: uppercase;
            text-shadow: 3px 3px 0px var(--cap-red);
        }

        .grid-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-opt {
            background: var(--cap-white);
            color: var(--cap-blue);
            border: none;
            padding: 18px 5px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 5px 0 #888;
            transition: 0.1s;
        }

        .btn-opt:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #888;
        }

        .correct { background-color: #2ecc71 !important; color: white !important; box-shadow: 0 5px 0 #27ae60 !important; }
        .wrong { background-color: #e74c3c !important; color: white !important; box-shadow: 0 5px 0 #c0392b !important; }

        #feedback-msg {
            height: 50px;
            margin-top: 20px;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .shield-mini { font-size: 30px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats-bar">
        <span>PONTOS: <span id="score">0</span></span>
        <span>MISSÃO: <span id="count">1</span>/30</span>
    </div>

    <div id="timer-wrap"><div id="timer-bar"></div></div>

    <div class="shield-mini">🛡️</div>
    <div class="word-display" id="word">---</div>
    
    <div class="grid-options" id="options"></div>
    <div id="feedback-msg"></div>
</div>

<script>
    const database = [
        {w:"herói", a:"he-rói"}, {w:"caixa", a:"cai-xa"}, {w:"peixe", a:"pei-xe"},
        {w:"noite", a:"noi-te"}, {w:"papai", a:"pa-pai"}, {w:"leite", a:"lei-te"},
        {w:"aula", a:"au-la"}, {w:"muito", a:"mui-to"}, {w:"glória", a:"gló-ria"},
        {w:"história", a:"his-tó-ria"}, {w:"saúde", a:"sa-ú-de"}, {w:"poeta", a:"po-e-ta"},
        {w:"moeda", a:"mo-e-da"}, {w:"viagem", a:"vi-a-gem"}, {w:"coelho", a:"co-e-lho"},
        {w:"lua", a:"lu-a"}, {w:"dia", a:"di-a"}, {w:"rainha", a:"ra-i-nha"},
        {w:"baú", a:"ba-ú"}, {w:"piada", a:"pi-a-da"}, {w:"paraguai", a:"pa-ra-guai"},
        {w:"uruguai", a:"u-ru-guai"}, {w:"quaisquer", a:"quais-quer"}, {w:"saguão", a:"sa-guão"},
        {w:"iguais", a:"i-guais"}, {w:"enxaguei", a:"en-xa-guei"}, {w:"averiguei", a:"a-ve-ri-guei"},
        {w:"quais", a:"quais"}, {w:"apaziguou", a:"a-pa-zi-guou"}, {w:"enxaguou", a:"en-xa-guou"}
    ];

    let score = 0;
    let index = 0;
    let timer;
    let timeLeft;
    let list = [];
    let active = true;

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function createFakes(correct) {
        const clean = correct.replace(/-/g, "");
        let fakes = new Set();
        // Fallbacks simples para evitar loops
        fakes.add(clean); // A palavra sem separação
        fakes.add(clean.split('').join('-')); // Separada letra por letra
        
        // Uma variação aleatória
        if(clean.length > 2) {
            let mid = Math.floor(clean.length / 2);
            fakes.add(clean.substring(0, mid) + "-" + clean.substring(mid));
        }
        
        let result = Array.from(fakes).filter(f => f !== correct).slice(0, 3);
        // Garante que sempre teremos 4 opções
        while(result.length < 3) result.push(clean + "-" + (result.length));
        return result;
    }

    function start() {
        list = shuffle([...database]);
        index = 0;
        loadQuestion();
    }

    function loadQuestion() {
        if(index >= list.length) index = 0; // Loop Infinito

        active = true;
        document.getElementById('feedback-msg').innerText = "";
        document.getElementById('count').innerText = index + 1;
        document.getElementById('score').innerText = score;

        const current = list[index];
        document.getElementById('word').innerText = current.w;

        const opts = shuffle([current.a, ...createFakes(current.a)]);
        const container = document.getElementById('options');
        container.innerHTML = "";

        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn-opt';
            b.innerText = o;
            b.onclick = () => check(o, b);
            container.appendChild(b);
        });

        runTimer();
    }

    function runTimer() {
        clearInterval(timer);
        timeLeft = 100;
        const bar = document.getElementById('timer-bar');
        timer = setInterval(() => {
            timeLeft -= 1.43; // ~7 segundos
            bar.style.width = timeLeft + "%";
            if(timeLeft <= 0) {
                clearInterval(timer);
                check(null, null);
            }
        }, 100);
    }

    function check(choice, btn) {
        if(!active) return;
        active = false;
        clearInterval(timer);

        const correct = list[index].a;
        const msg = document.getElementById('feedback-msg');

        if(choice === correct) {
            score += 10;
            btn.classList.add('correct');
            msg.innerHTML = "⭐ AVANTE, CAPITÃO!";
        } else {
            if(btn) btn.classList.add('wrong');
            msg.innerHTML = "⚠️ PERSISTA! O CORRETO É: " + correct;
            // Destaca a correta
            Array.from(document.getElementsByClassName('btn-opt')).forEach(b => {
                if(b.innerText === correct) b.classList.add('correct');
            });
        }

        index++;
        setTimeout(loadQuestion, 2500);
    }

    start();
</script>

</body>
</html>
