
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capitão América: Mestre das Sílabas 100</title>
    <style>
        :root {
            --cap-blue: #002147;
            --cap-red: #cc0000;
            --cap-white: #ffffff;
            --cap-silver: #c0c0c0;
            --step-color: #ffeb3b;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            background-color: #050505;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #game-container {
            background: linear-gradient(145deg, var(--cap-blue), #000);
            border: 4px solid var(--cap-silver);
            border-radius: 20px;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 33, 71, 0.8);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            color: var(--cap-silver);
            margin-bottom: 5px;
        }

        .step-indicator {
            font-size: 14px;
            color: var(--step-color);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        #timer-wrap {
            width: 100%;
            height: 12px;
            background: #222;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #555;
            overflow: hidden;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--cap-red), #ffeb3b);
            transition: width 0.1s linear;
        }

        .word-display {
            font-size: 36px;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px var(--cap-red);
            min-height: 50px;
        }

        .grid-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-opt {
            background: var(--cap-white);
            color: var(--cap-blue);
            border: none;
            padding: 15px 5px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 0 #888;
            transition: 0.1s;
        }

        .btn-opt:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #888;
        }

        .correct { background-color: #2ecc71 !important; color: white !important; box-shadow: 0 4px 0 #27ae60 !important; }
        .wrong { background-color: #e74c3c !important; color: white !important; box-shadow: 0 4px 0 #c0392b !important; }

        #feedback-msg {
            height: 40px;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats-bar">
        <span>SCORE: <span id="score">0</span></span>
        <span>PALAVRA: <span id="count">1</span>/100</span>
    </div>
    <div class="step-indicator" id="step-name">ETAPA 1: SEPARAÇÃO</div>

    <div id="timer-wrap"><div id="timer-bar"></div></div>

    <div class="word-display" id="word">---</div>
    
    <div class="grid-options" id="options"></div>
    <div id="feedback-msg"></div>
</div>

<script>
    const database = [
        // DITONGOS
        {w:"peixe", a:"pei-xe", e:"ditongo", n:"dissílaba"}, {w:"caixa", a:"cai-xa", e:"ditongo", n:"dissílaba"}, {w:"noite", a:"noi-te", e:"ditongo", n:"dissílaba"}, {w:"aula", a:"au-la", e:"ditongo", n:"dissílaba"}, {w:"muito", a:"mui-to", e:"ditongo", n:"dissílaba"},
        {w:"leite", a:"lei-te", e:"ditongo", n:"dissílaba"}, {w:"papai", a:"pa-pai", e:"ditongo", n:"dissílaba"}, {w:"herói", a:"he-rói", e:"ditongo", n:"dissílaba"}, {w:"fogo", a:"fo-go", e:"ditongo", n:"dissílaba"}, {w:"loira", a:"loi-ra", e:"ditongo", n:"dissílaba"},
        {w:"beijo", a:"bei-jo", e:"ditongo", n:"dissílaba"}, {w:"causa", a:"cau-sa", e:"ditongo", n:"dissílaba"}, {w:"doutor", a:"dou-tor", e:"ditongo", n:"dissílaba"}, {w:"ouro", a:"ou-ro", e:"ditongo", n:"dissílaba"}, {w:"touro", a:"tou-ro", e:"ditongo", n:"dissílaba"},
        {w:"baixo", a:"bai-xo", e:"ditongo", n:"dissílaba"}, {w:"faixa", a:"fai-xa", e:"ditongo", n:"dissílaba"}, {w:"feixe", a:"fei-xe", e:"ditongo", n:"dissílaba"}, {w:"jeito", a:"jei-to", e:"ditongo", n:"dissílaba"}, {w:"meia", a:"mei-a", e:"ditongo", n:"dissílaba"},
        {w:"pauta", a:"pau-ta", e:"ditongo", n:"dissílaba"}, {w:"reino", a:"rei-no", e:"ditongo", n:"dissílaba"}, {w:"saudade", a:"sau-da-de", e:"ditongo", n:"trissílaba"}, {w:"tesouro", a:"te-sou-ro", e:"ditongo", n:"trissílaba"}, {w:"vassoura", a:"vas-sou-ra", e:"ditongo", n:"trissílaba"},
        {w:"madeira", a:"ma-dei-ra", e:"ditongo", n:"trissílaba"}, {w:"primeiro", a:"pri-mei-ro", e:"ditongo", n:"trissílaba"}, {w:"queijo", a:"quei-jo", e:"ditongo", n:"dissílaba"}, {w:"roupa", a:"rou-pa", e:"ditongo", n:"dissílaba"}, {w:"nauta", a:"nau-ta", e:"ditongo", n:"dissílaba"},
        {w:"glória", a:"gló-ria", e:"ditongo", n:"dissílaba"}, {w:"série", a:"sé-rie", e:"ditongo", n:"dissílaba"}, {w:"vácuo", a:"vá-cuo", e:"ditongo", n:"dissílaba"}, {w:"águia", a:"á-guia", e:"ditongo", n:"dissílaba"},

        // HIATOS
        {w:"saúde", a:"sa-ú-de", e:"hiato", n:"trissílaba"}, {w:"poeta", a:"po-e-ta", e:"hiato", n:"trissílaba"}, {w:"moeda", a:"mo-e-da", e:"hiato", n:"trissílaba"}, {w:"viagem", a:"vi-a-gem", e:"hiato", n:"trissílaba"}, {w:"coelho", a:"co-e-lho", e:"hiato", n:"trissílaba"},
        {w:"lua", a:"lu-a", e:"hiato", n:"dissílaba"}, {w:"dia", a:"di-a", e:"hiato", n:"dissílaba"}, {w:"rainha", a:"ra-i-nha", e:"hiato", n:"trissílaba"}, {w:"baú", a:"ba-ú", e:"hiato", n:"dissílaba"}, {w:"piada", a:"pi-a-da", e:"hiato", n:"trissílaba"},
        {w:"caos", a:"ca-os", e:"hiato", n:"dissílaba"}, {w:"teatro", a:"te-a-tro", e:"hiato", n:"trissílaba"}, {w:"ciúme", a:"ci-ú-me", e:"hiato", n:"trissílaba"}, {w:"miolo", a:"mi-o-lo", e:"hiato", n:"trissílaba"}, {w:"navio", a:"na-vi-o", e:"hiato", n:"trissílaba"},
        {w:"dueto", a:"du-e-to", e:"hiato", n:"trissílaba"}, {w:"vazio", a:"va-zi-o", e:"hiato", n:"trissílaba"}, {w:"poesia", a:"po-e-si-a", e:"hiato", n:"polissílaba"}, {w:"cruel", a:"cru-el", e:"hiato", n:"dissílaba"}, {w:"rua", a:"ru-a", e:"hiato", n:"dissílaba"},
        {w:"tua", a:"tu-a", e:"hiato", n:"dissílaba"}, {w:"sua", a:"su-a", e:"hiato", n:"dissílaba"}, {w:"fiado", a:"fi-a-do", e:"hiato", n:"trissílaba"}, {w:"piano", a:"pi-a-no", e:"hiato", n:"trissílaba"}, {w:"rio", a:"ri-o", e:"hiato", n:"dissílaba"},
        {w:"canoa", a:"ca-no-a", e:"hiato", n:"trissílaba"}, {w:"lagoa", a:"la-go-a", e:"hiato", n:"trissílaba"}, {w:"magoa", a:"ma-go-a", e:"hiato", n:"trissílaba"}, {w:"geada", a:"ge-a-da", e:"hiato", n:"trissílaba"}, {w:"cadeado", a:"ca-de-a-do", e:"hiato", n:"polissílaba"},
        {w:"amendoim", a:"a-men-do-im", e:"hiato", n:"polissílaba"}, {w:"ruína", a:"ru-í-na", e:"hiato", n:"trissílaba"}, {w:"baía", a:"ba-í-a", e:"hiato", n:"trissílaba"},

        // TRITONGOS
        {w:"paraguai", a:"pa-ra-guai", e:"tritongo", n:"trissílaba"}, {w:"uruguai", a:"u-ru-guai", e:"tritongo", n:"trissílaba"}, {w:"saguão", a:"sa-guão", e:"tritongo", n:"dissílaba"}, {w:"iguais", a:"i-guais", e:"tritongo", n:"dissílaba"}, {w:"quais", a:"quais", e:"tritongo", n:"monossílaba"},
        {w:"enxaguou", a:"en-xa-guou", e:"tritongo", n:"trissílaba"}, {w:"quaisquer", a:"quais-quer", e:"tritongo", n:"dissílaba"}, {w:"averiguei", a:"a-ve-ri-guei", e:"tritongo", n:"polissílaba"}, {w:"enxaguei", a:"en-xa-guei", e:"tritongo", n:"trissílaba"}, {w:"apaziguou", a:"a-pa-zi-guou", e:"tritongo", n:"polissílaba"},
        {w:"uai", a:"uai", e:"tritongo", n:"monossílaba"}, {w:"quão", a:"quão", e:"tritongo", n:"monossílaba"}, {w:"miau", a:"miau", e:"tritongo", n:"monossílaba"}, {w:"saguis", a:"sa-guis", e:"tritongo", n:"dissílaba"}, {w:"delinquiu", a:"de-lin-quiu", e:"tritongo", n:"trissílaba"},
        {w:"enxaguam", a:"en-xa-guam", e:"tritongo", n:"trissílaba"}, {w:"averiguam", a:"a-ve-ri-guam", e:"tritongo", n:"polissílaba"}, {w:"iguais", a:"i-guais", e:"tritongo", n:"dissílaba"}, {w:"saguões", a:"sa-guões", e:"tritongo", n:"dissílaba"}, {w:"quais", a:"quais", e:"tritongo", n:"monossílaba"},

        // MONOSSÍLABAS ADICIONAIS
        {w:"mãe", a:"mãe", e:"ditongo", n:"monossílaba"}, {w:"pão", a:"pão", e:"ditongo", n:"monossílaba"}, {w:"céu", a:"céu", e:"ditongo", n:"monossílaba"}, {w:"pai", a:"pai", e:"ditongo", n:"monossílaba"}, {w:"sol", a:"sol", e:"hiato", n:"monossílaba"}, // Sol não tem encontro, mas entra para treino de n.
        {w:"pau", a:"pau", e:"ditongo", n:"monossílaba"}, {w:"boi", a:"boi", e:"ditongo", n:"monossílaba"}, {w:"cais", a:"cais", e:"ditongo", n:"monossílaba"}, {w:"meu", a:"meu", e:"ditongo", n:"monossílaba"}, {w:"seu", a:"seu", e:"ditongo", n:"monossílaba"},
        {w:"vi", a:"vi", e:"hiato", n:"monossílaba"}, {w:"pé", a:"pé", e:"hiato", n:"monossílaba"}, {w:"mão", a:"mão", e:"ditongo", n:"monossílaba"}
    ];

    let score = 0;
    let wordIdx = 0;
    let step = 1; // 1: Separação, 2: Encontro, 3: Número
    let timer;
    let timeLeft;
    let list = [];
    let active = true;

    const labels = ["", "ETAPA 1: SEPARAÇÃO", "ETAPA 2: ENCONTRO VOCÁLICO", "ETAPA 3: NÚMERO DE SÍLABAS"];

    function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

    function getFakes(type, correct) {
        if(type === 1) { // Fakes de separação
            const c = correct.replace(/-/g, "");
            let f = new Set([c, c.split('').join('-')]);
            if(c.length > 2) f.add(c.substring(0,1)+"-"+c.substring(1));
            let r = Array.from(f).filter(x => x !== correct).slice(0,3);
            while(r.length < 3) r.push(c + "-" + r.length);
            return r;
        }
        if(type === 2) return ["hiato", "ditongo", "tritongo"].filter(x => x !== correct);
        if(type === 3) return ["monossílaba", "dissílaba", "trissílaba", "polissílaba"].filter(x => x !== correct);
    }

    function start() {
        list = shuffle([...database]);
        wordIdx = 0;
        step = 1;
        loadStep();
    }

    function loadStep() {
        active = true;
        document.getElementById('feedback-msg').innerText = "";
        document.getElementById('count').innerText = wordIdx + 1;
        document.getElementById('score').innerText = score;
        document.getElementById('step-name').innerText = labels[step];

        const current = list[wordIdx];
        document.getElementById('word').innerText = current.w;

        let correct = (step === 1) ? current.a : (step === 2 ? current.e : current.n);
        let opts = shuffle([correct, ...getFakes(step, correct)]);
        
        const container = document.getElementById('options');
        container.innerHTML = "";
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn-opt';
            b.innerText = o;
            b.onclick = () => check(o, b);
            container.appendChild(b);
        });

        runTimer();
    }

    function runTimer() {
        clearInterval(timer);
        timeLeft = 100;
        const bar = document.getElementById('timer-bar');
        timer = setInterval(() => {
            timeLeft -= 1.43; 
            bar.style.width = timeLeft + "%";
            if(timeLeft <= 0) { clearInterval(timer); check(null, null); }
        }, 100);
    }

    function check(choice, btn) {
        if(!active) return;
        active = false;
        clearInterval(timer);

        const current = list[wordIdx];
        const correct = (step === 1) ? current.a : (step === 2 ? current.e : current.n);
        const points = (step === 1) ? 5 : (step === 2 ? 3 : 2);

        if(choice === correct) {
            score += points;
            if(btn) btn.classList.add('correct');
            document.getElementById('feedback-msg').innerHTML = "<span style='color:#2ecc71'>ACERTOU! +" + points + "pts</span>";
        } else {
            if(btn) btn.classList.add('wrong');
            document.getElementById('feedback-msg').innerHTML = "<span style='color:#ff4444'>ERROU! ERA: " + correct + "</span>";
            Array.from(document.getElementsByClassName('btn-opt')).forEach(b => {
                if(b.innerText === correct) b.classList.add('correct');
            });
        }

        setTimeout(() => {
            if(step < 3) {
                step++;
            } else {
                step = 1;
                wordIdx++;
                if(wordIdx >= list.length) wordIdx = 0;
            }
            loadStep();
        }, 1500);
    }

    start();
</script>

</body>
</html>
