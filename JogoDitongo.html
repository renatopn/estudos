            font-size: 18px;

            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            box-shadow: 0 4px #800000;
        }

        button:active {
            box-shadow: 0 0 #800000;
            transform: translateY(4px);
        }

        #feedback {
            margin-top: 25px;
            font-size: 20px;
            min-height: 60px;
            font-weight: bold;
            padding: 10px;
        }

        .correct { color: #4CAF50; text-shadow: 1px 1px #000; }
        .wrong { color: #ff6666; text-shadow: 1px 1px #000; }

        .stats {
            margin-top: 20px;
            font-size: 16px;
            color: var(--cap-silver);
            font-weight: bold;
        }

        .instruction {
            font-size: 15px;
            margin-bottom: 15px;
            color: #ddd;
        }
    </style>
</head>

    <div id="game-container">
        <div class="header-stats">

            <span>Missão: <span id="round">1</span>/30</span>

        </div>

        <div class="shield-icon">🛡️</div>

        <div class="options-grid" id="options-container">
            </div>
    </div>
</div>

<script>
    const allWords = [
        { w: "herói", a: "he-rói" }, { w: "caixa", a: "cai-xa" }, { w: "peixe", a: "pei-xe" },
        { w: "noite", a: "noi-te" }, { w: "papai", a: "pa-pai" }, { w: "leite", a: "lei-te" },
        { w: "aula", a: "au-la" }, { w: "muito", a: "mui-to" }, { w: "glória", a: "gló-ria" },
        { w: "história", a: "his-tó-ria" }, { w: "saúde", a: "sa-ú-de" }, { w: "poeta", a: "po-e-ta" },
        { w: "moeda", a: "mo-e-da" }, { w: "viagem", a: "vi-a-gem" }, { w: "coelho", a: "co-e-lho" },
        { w: "lua", a: "lu-a" }, { w: "dia", a: "di-a" }, { w: "rainha", a: "ra-i-nha" },
        { w: "baú", a: "ba-ú" }, { w: "piada", a: "pi-a-da" }, { w: "paraguai", a: "pa-ra-guai" },
        { w: "uruguai", a: "u-ru-guai" }, { w: "quaisquer", a: "quais-quer" }, { w: "saguão", a: "sa-guão" },
        { w: "iguais", a: "i-guais" }, { w: "enxaguei", a: "en-xa-guei" }, { w: "averiguei", a: "a-ve-ri-guei" },
        { w: "quais", a: "quais" }, { w: "apaziguou", a: "a-pa-zi-guou" }, { w: "enxaguou", a: "en-xa-guou" }
    ];

    let currentList = [];
    let currentIndex = 0;
    let score = 0;
    let timeLeft = 100;
    let timerId = null;
    let canClick = true;

    const msgAcerto = ["AVANTE!", "PERFEITO!", "COMO UM VINGADOR!", "NA MOSCA!", "EXCELENTE!"];
    const msgErro = ["NÃO DESISTA!", "TENTE DE NOVO!", "FOCO, CAPITÃO!", "QUASE LÁ!", "TREINE MAIS!"];

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    // Gera opções erradas baseadas na palavra para confundir de forma educativa
    function generateFakeOptions(correct) {
        let fakes = new Set();
        const clean = correct.replace(/-/g, "");
        
        while(fakes.size < 3) {
            let fake = "";
            if(Math.random() > 0.5) {
                // Erro comum: não separar hiato ou separar ditongo
                fake = clean.length > 3 ? clean.substring(0,2) + "-" + clean.substring(2) : clean;
            } else {
                fake = clean.split('').join('-');
            }
            if(fake !== correct) fakes.add(fake);
        }
        return Array.from(fakes);
    }

    function startNewGame() {
        currentList = shuffle([...allWords]);
        currentIndex = 0;
        nextQuestion();
    }

    function nextQuestion() {
        if(currentIndex >= currentList.length) {
            currentIndex = 0;
            shuffle(currentList);
        }

        canClick = true;
        document.getElementById('message').innerText = "";
        document.getElementById('score').innerText = score;
        document.getElementById('round').innerText = currentIndex + 1;
        
        const currentData = currentList[currentIndex];
        document.getElementById('target-word').innerText = currentData.w;

        // Preparar Botões
        const options = shuffle([currentData.a, ...generateFakeOptions(currentData.a)]);
        const container = document.getElementById('options-container');
        container.innerHTML = "";

        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, btn);
            container.appendChild(btn);
        });

        startTimer();
    }

    function startTimer() {
        clearInterval(timerId);
        timeLeft = 100;
        const bar = document.getElementById('timer-bar');
        
        timerId = setInterval(() => {
            timeLeft -= 1.43; // Aproximadamente 7 segundos (100 / 7 / 10 fps)
            bar.style.width = timeLeft + "%";

            if(timeLeft <= 0) {
                clearInterval(timerId);
                handleTimeout();
            }
        }, 100);
    }

    function checkAnswer(selected, btn) {
        if(!canClick) return;
        canClick = false;
        clearInterval(timerId);

        const correct = currentList[currentIndex].a;
        if(selected === correct) {
            score += 10;
            btn.classList.add('correct');
            document.getElementById('message').innerHTML = `<span style="color:#4CAF50">${msgAcerto[Math.floor(Math.random()*msgAcerto.length)]}</span>`;
        } else {
            btn.classList.add('wrong');
            document.getElementById('message').innerHTML = `<span style="color:#ff6666">${msgErro[Math.floor(Math.random()*msgErro.length)]}</span>`;
            // Mostra a correta
            Array.from(document.getElementsByClassName('option-btn')).forEach(b => {
                if(b.innerText === correct) b.classList.add('correct');
            });
        }

        currentIndex++;
        setTimeout(nextQuestion, 2000);
    }

    function handleTimeout() {
        if(!canClick) return;
        canClick = false;
        document.getElementById('message').innerHTML = `<span style="color:#ff6666">TEMPO ESGOTADO!</span>`;
        
        const correct = currentList[currentIndex].a;
        Array.from(document.getElementsByClassName('option-btn')).forEach(b => {
            if(b.innerText === correct) b.classList.add('correct');
        });

        currentIndex++;
        setTimeout(nextQuestion, 2000);
    }

    window.onload = startNewGame;
</script>

</body>
